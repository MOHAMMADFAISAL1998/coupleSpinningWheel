<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spinning Wheel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="result-display">Spin for Adventure!</div>
    <div id="redirect-message" style="display: none; font-size: 1.8em; color: #f1c40f; font-weight: bold; margin-top: 40px;"></div>

    <div class="wheel-container">
        <div class="arrow"></div>
        <div id="wheel"></div>
    </div>

    <button id="spinBtn" class="spin-btn" onclick="spinWheel()">SPIN</button>

    <script src="script.js"></script>

</body>
</html>
