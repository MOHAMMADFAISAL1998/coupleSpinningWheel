<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spinning Wheel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Setup Screen -->
    <div id="setup-screen" class="setup-container">
        <div class="setup-header">
            <h1>🎯 Get Ready to Play!</h1>
            <p class="setup-subtitle">Choose your colors and decide who goes first</p>
        </div>

        <div class="setup-content">
            <div class="player-card">
                <div class="card-header">
                    <div class="player-icon">👤</div>
                    <h2>Player 1</h2>
                </div>
                <div class="card-content">
                    <h3>Choose Your Color</h3>
                    <div class="color-picker">
                        <div class="color-option" data-player="1" data-color="#FF6B6B" style="background-color: #FF6B6B;" title="Red"></div>
                        <div class="color-option" data-player="1" data-color="#1580d1" style="background-color: #1580d1;" title="Teal"></div>
                        <div class="color-option" data-player="1" data-color="#FFD93D" style="background-color: #FFD93D;" title="Yellow"></div>
                        <div class="color-option" data-player="1" data-color="#6C5CE7" style="background-color: #6C5CE7;" title="Purple"></div>
                        <div class="color-option" data-player="1" data-color="#FF8A65" style="background-color: #FF8A65;" title="Orange"></div>
                        <div class="color-option" data-player="1" data-color="#25fbad" style="background-color: #25fbad;" title="Mint"></div>
                    </div>
                    <p id="player1-color-display" class="color-display">Selected: None</p>
                </div>
            </div>

            <div class="player-card">
                <div class="card-header">
                    <div class="player-icon">👤</div>
                    <h2>Player 2</h2>
                </div>
                <div class="card-content">
                    <h3>Choose Your Color</h3>
                    <div class="color-picker">
                        <div class="color-option" data-player="2" data-color="#FF6B6B" style="background-color: #FF6B6B;" title="Red"></div>
                        <div class="color-option" data-player="2" data-color="#1580d1" style="background-color: #1580d1;" title="Teal"></div>
                        <div class="color-option" data-player="2" data-color="#FFD93D" style="background-color: #FFD93D;" title="Yellow"></div>
                        <div class="color-option" data-player="2" data-color="#6C5CE7" style="background-color: #6C5CE7;" title="Purple"></div>
                        <div class="color-option" data-player="2" data-color="#FF8A65" style="background-color: #FF8A65;" title="Orange"></div>
                        <div class="color-option" data-player="2" data-color="#25fbad" style="background-color: #25fbad;" title="Mint"></div>
                    </div>
                    <p id="player2-color-display" class="color-display">Selected: None</p>
                </div>
            </div>

            <div class="turn-card">
                <div class="card-header">
                    <div class="turn-icon">🎲</div>
                    <h2>Game Setup</h2>
                </div>
                <div class="card-content">
                    <h3>Who Goes First?</h3>
                    <div class="turn-buttons">
                        <button class="first-btn" onclick="setFirstPlayer(1)">
                            <span class="btn-icon">1️⃣</span>
                            Player 1 Starts
                        </button>
                        <button class="first-btn" onclick="setFirstPlayer(2)">
                            <span class="btn-icon">2️⃣</span>
                            Player 2 Starts
                        </button>
                    </div>
                </div>
            </div>

            <button id="start-btn" class="setup-btn" onclick="startGame()" disabled>
                <span class="btn-icon">🚀</span>
                Start Game
            </button>
        </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="game-container" style="display: none;">
        <div id="player-turn-indicator" class="turn-indicator">Player 1's Turn</div>
        <div id="result-display">Spin for Adventure!</div>
        <div id="redirect-message" style="display: none; font-size: 1.8em; color: #f1c40f; font-weight: bold; margin-top: 40px;"></div>

        <div class="wheel-container">
            <div class="arrow"></div>
            <div id="wheel"></div>
        </div>

        <button id="spinBtn" class="spin-btn" onclick="spinWheel()">SPIN</button>
    </div>

    <script src="script.js"></script>

</body>
</html>
