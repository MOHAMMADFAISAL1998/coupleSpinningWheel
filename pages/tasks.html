<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Tasks</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .tasks-container {
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
            background-color: #34495e;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .tasks-container h1 {
            text-align: center;
            color: #f1c40f;
            margin-bottom: 30px;
            font-size: 1.8em;
        }

        .task-item {
            background-color: #2c3e50;
            border: 2px solid #7f8c8d;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
        }

        .task-item.completed {
            background-color: #27ae60;
            border-color: #2ecc71;
        }

        .task-checkbox {
            width: 24px;
            height: 24px;
            margin-right: 15px;
            cursor: pointer;
            accent-color: #f1c40f;
        }

        .task-text {
            flex: 1;
            font-size: 1.1em;
            color: white;
        }

        .task-item.completed .task-text {
            color: #ecf0f1;
            text-decoration: line-through;
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background-color: #2c3e50;
            border-radius: 15px;
            border: 2px solid #7f8c8d;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #f1c40f, #e67e22);
            width: 0%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: black;
            font-weight: bold;
            transition: width 0.3s ease;
        }

        .progress-text {
            text-align: center;
            font-size: 0.9em;
            color: #bdc3c7;
            margin-bottom: 15px;
        }

        .continue-btn {
            width: 100%;
            padding: 15px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
            display: none;
        }

        .continue-btn:hover:not(:disabled) {
            background-color: #c0392b;
            transform: scale(1.05);
        }

        .continue-btn:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }

        .continue-btn.active {
            display: block;
            background-color: #2ecc71;
        }

        .continue-btn.active:hover {
            background-color: #27ae60;
        }
    </style>
</head>
<body>

    <div class="tasks-container">
        <h1>Complete These Tasks!</h1>
        
        <div class="progress-text">Progress: <span id="progress-count">0</span>/3</div>
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>

        <div id="tasks-list"></div>

        <button class="continue-btn" id="continueBtn" onclick="completeTasksAndContinue()">Continue to Final Message 🎉</button>
    </div>

    <script src="../tasks.js"></script>

</body>
</html>
